spring.application.name=service-1
# ===============================
# DATABASE
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/blogs
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# ===============================
# LIQUIBASE
# ===============================
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# SPRINGDOC / SWAGGER
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.show-actuator=false

# ===============================
# KEYCLOAK
# ===============================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8081/realms/blogs-app
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8081/realms/blogs-app/protocol/openid-connect/certs

#================================
# Keycloak Admin Client
#================================
keycloak.server-url=http://localhost:8081
keycloak.realm=blogs-app
keycloak.admin-username=admin
keycloak.admin-password=@Password12
keycloak.admin-client-id=blogs-app
